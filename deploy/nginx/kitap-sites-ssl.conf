# =============================================================
# Sesli Kitap - Nginx + SSL (Let's Encrypt sonrası örnek)
# ÖNERİ: certbot --nginx kullanın, otomatik yapılandırır.
# Manuel: certbot certonly --standalone ile sertifika alıp bu dosyayı kullanın.
# options-ssl-nginx.conf ve ssl-dhparams.pem certbot tarafından oluşturulur.
# =============================================================

# Web sitesi - kitap1.beratsimsek.com.tr
server {
    listen 80;
    listen [::]:80;
    server_name kitap1.beratsimsek.com.tr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kitap1.beratsimsek.com.tr;

    ssl_certificate /etc/letsencrypt/live/kitap1.beratsimsek.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kitap1.beratsimsek.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# API - api1.beratsimsek.com.tr
server {
    listen 80;
    listen [::]:80;
    server_name api1.beratsimsek.com.tr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api1.beratsimsek.com.tr;

    ssl_certificate /etc/letsencrypt/live/kitap1.beratsimsek.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kitap1.beratsimsek.com.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /uploads/ {
        alias /var/www/kitap-app/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

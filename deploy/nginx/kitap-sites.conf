# =============================================================
# Sesli Kitap - Nginx Yapılandırması
# kitap1.beratsimsek.com.tr  → Web sitesi (Next.js)
# api1.beratsimsek.com.tr    → API (Node.js/Express)
# =============================================================
# Kurulum: Bu dosyayı /etc/nginx/sites-available/ altına kopyalayın
#          ln -sf /etc/nginx/sites-available/kitap-sites.conf /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# =============================================================

# Web sitesi - kitap1.beratsimsek.com.tr
server {
    listen 80;
    listen [::]:80;
    server_name kitap1.beratsimsek.com.tr;

    # HTTPS yönlendirmesi (Let's Encrypt kurulduktan sonra aktif)
    # return 301 https://$server_name$request_uri;

    # Next.js (PM2 ile port 3000'de çalışır)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Static dosyalar (Next.js build)
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# API - api1.beratsimsek.com.tr
# CORS backend (.env ALLOWED_ORIGINS) tarafından yönetilir
server {
    listen 80;
    listen [::]:80;
    server_name api1.beratsimsek.com.tr;

    # HTTPS yönlendirmesi (Let's Encrypt kurulduktan sonra aktif)
    # return 301 https://$server_name$request_uri;

    # API proxy
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Uploads klasörü (dosya yükleme)
    location /uploads/ {
        alias /var/www/kitap-app/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================
# HTTPS (Let's Encrypt) - Certbot kurulduktan sonra:
# certbot --nginx -d kitap1.beratsimsek.com.tr -d api1.beratsimsek.com.tr
# Bu komut otomatik olarak HTTPS server blokları ekleyecektir.
# =============================================================
